<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner - Optimiseur DevOps</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="container">
        <h1>🗽 Trip Optimizer</h1>
        
        <label for="city">Ville de destination :</label>
        <input type="text" id="city" placeholder="Ex: Paris, Tokyo, New York..." value="New York" required>
        <div class="mode-selector"> </div>

        <label for="days">Nombre de jours de séjour :</label>
        <input type="number" id="days" value="2" min="1" title="Entrez le nombre de jours">
        
        <hr>

        <div class="mode-selector">
    <button type="button" id="btn-mode-list" class="btn-mode active" onclick="switchMode('list')">Mode Liste</button>
    <button type="button" id="btn-mode-text" class="btn-mode" onclick="switchMode('text')">Mode Texte</button>
</div>

        <div id="container-list">
            <h3>Activités prévues</h3>
            <div id="activities-list">
                </div>
            <button type="button" class="btn-add" onclick="addActivityField()">+ Ajouter une activité</button>
        </div>

        <div id="container-text" style="display:none;">
            <h3>Copiez votre liste ici</h3>
            <p class="hint">Attention à bien mettre une activité par ligne avec le format Nom : Adresse (catégorie)</p>
            <p class="hint"> Les catégories sont : Musée, Parc, Restaurant, Monument, Shopping, Boite de nuit, Autre</p>
            <textarea id="bulk-text" rows="10" placeholder="Exemple :&#10;Empire State : 350 5th Ave (Musée)&#10;MoMa : 11 W 53rd St (Musée)"></textarea>
        </div>
        
        <button type="button" class="btn-submit" onclick="sendData()">OPTIMISER MON TRAJET</button>
        <div id="map" style="height: 400px; width: 100%; margin: 20px 0; border-radius: 10px; border: 1px solid #ccc;"></div> 
        <div id="result"></div>
    </div>
    <script src="script.js"></script>

    <hr>
<h2>Derniers itinéraires (5 jours)</h2>
<div id="recent-itineraries"></div>

<script>
    fetchRecentItineraries();
</script>

</body>
</html>
